<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendEase | Smart Attendance Calculator</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-card">
        <div class="loader-logo">🎓</div>
        <h1>AttendEase</h1>
        <p>Smart Attendance Calculator</p>
    </div>
</div>

<!-- THEME BUTTON -->
<div class="theme-toggle">
    <button id="themeBtn">🌙</button>
</div>

<!-- STARS -->
<div class="stars">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
</div>

<!-- MAIN APP -->
<div class="container">

    <h1>🎓 AttendEase</h1>

    <p class="subtitle">Smart Attendance Calculator</p>
    <p class="tagline">Track • Plan • Succeed</p>

    <!-- TABS -->
    <div class="tabs">

        <button class="tab active" onclick="showTab('calculator')">📊 Calculator</button>
        <button class="tab" onclick="showTab('bunk')">😎 Bunk</button>
        <button class="tab" onclick="showTab('history')">📚 History</button>
        <button class="tab" onclick="showTab('analytics')">📈 Analytics</button>

    </div>

    <!-- CALCULATOR -->
    <div id="calculator" class="tab-content active">

        <div class="card">

            <label>📚 Classes Attended</label>
            <input type="number" id="attended" placeholder="Enter attended classes">

            <label>📖 Total Classes</label>
            <input type="number" id="total" placeholder="Enter total classes">

            <label>🎯 Target Attendance</label>
            <select id="target">
                <option value="75">75%</option>
                <option value="80">80%</option>
                <option value="85">85%</option>
                <option value="90">90%</option>
                <option value="95">95%</option>
            </select>

            <div class="button-group">
                <button onclick="calculateAttendance()">Calculate</button>
                <button class="reset-btn" onclick="resetForm()">Reset</button>
            </div>

            <button id="installBtn" style="display:none;">📲 Install App</button>

            <div class="results">

                <div id="result" class="result-card">Your Result Appears Here</div>

                <div class="progress-ring">
                    <svg width="180" height="180" viewBox="0 0 180 180">

                        <circle class="progress-bg" cx="90" cy="90" r="70"></circle>

                        <circle id="progressCircle" class="progress-circle" cx="90" cy="90" r="70"></circle>

                    </svg>

                    <div id="progressText" class="progress-text">0%</div>
                </div>

                <div id="bunkResult" class="result-card"></div>
                <div id="needResult" class="result-card"></div>

            </div>

        </div>

    </div>

    <!-- BUNK -->
    <div id="bunk" class="tab-content">
        <div id="bunkResult" class="result-card"></div>
    </div>

    <!-- HISTORY -->
    <div id="history" class="tab-content">

        <div class="history-card">

            <h2>📜 Attendance History</h2>

            <button id="clearHistoryBtn">🗑 Clear History</button>

            <div id="historyList">No History Yet</div>

        </div>

    </div>

    <!-- ANALYTICS -->
    <div id="analytics" class="tab-content">

        <div class="analytics-card">

            <h2>📊 Analytics</h2>

            <div class="analytics-grid">

                <div class="analytics-box">
                    <span>Total Classes</span>
                    <h3 id="totalClasses">0</h3>
                </div>

                <div class="analytics-box">
                    <span>Attended</span>
                    <h3 id="attendedClasses">0</h3>
                </div>

                <div class="analytics-box">
                    <span>Missed</span>
                    <h3 id="missedClasses">0</h3>
                </div>

                <div class="analytics-box">
                    <span>Attendance</span>
                    <h3 id="attendancePercent">0%</h3>
                </div>

            </div>

        </div>

    </div>

    <footer>
        <p>Built with ❤️ by Beast Boy</p>
        <p>AttendEase v1.0</p>
    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
