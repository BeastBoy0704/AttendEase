<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendEase | Smart Attendance Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background Circles -->
    <div class="bg-circle circle1"></div>
    <div class="bg-circle circle2"></div>

    <!-- Main Container -->
    <div class="container">

        <h1>🎓 AttendEase</h1>

        <p class="subtitle">
            Smart Attendance Calculator
        </p>

        <p class="tagline">
            Track • Plan • Succeed
        </p>

        <div class="card">

            <label>📚 Classes Attended</label>

            <input
                type="number"
                id="attended"
                placeholder="Enter attended classes">

            <label>📖 Total Classes</label>

            <input
                type="number"
                id="total"
                placeholder="Enter total classes">

            <label>🎯 Target Attendance</label>

            <select id="target">

                <option value="75">75%</option>
                <option value="80">80%</option>
                <option value="85">85%</option>
                <option value="90">90%</option>
                <option value="95">95%</option>

            </select>

            <div class="button-group">

                <button onclick="calculateAttendance()">
                    Calculate
                </button>

                <button class="reset-btn" onclick="resetForm()">
                    Reset
                </button>

            </div>

            <div class="results">

                <div id="result" class="result-card">
                    Your Result Appears Here
                </div>

                <div class="progress-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>

                <div id="bunkResult" class="result-card"></div>

                <div id="needResult" class="result-card"></div>

            </div>

        </div>

        <footer>

            <p>Built with ❤️ by Beast Boy</p>

            <p>AttendEase v1.0</p>

        </footer>

    </div>

    <script src="script.js"></script>

</body>

</html>
